name: Instagram RSS Bot

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

# Добавляем права на запись в репозиторий, чтобы сохранить history.txt
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install feedparser requests

      - run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      # НОВЫЙ ШАГ: Сохраняем историю в GitHub
      - name: Commit and Push History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.txt
          # Коммитим только если файл действительно изменился, чтобы избежать ошибок
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update history.txt [skip ci]" && git push)